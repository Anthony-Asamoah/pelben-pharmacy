<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PelBen Pharmacy — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  </head>
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
    }

    .bgimg {
      background-image: linear-gradient(135deg, rgba(13,13,13,0.75) 0%, rgba(26,26,46,0.75) 50%, rgba(22,33,62,0.75) 100%), url("backdrop.jpg");
      min-height: 100%;
      background-position: center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      font-family: "Lato", sans-serif;
      color: rgba(220, 220, 220, 0.9);
    }

    .topleft {
      padding: 20px 28px;
    }

    .topleft p {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffffff;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      letter-spacing: 8px;
      color: #ffffff;
      margin: 0 0 12px 0;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      width: 40%;
      margin: 20px auto;
    }

    #demo {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 300;
      letter-spacing: 5px;
      color: rgba(255, 255, 255, 0.8);
      margin: 0;
    }

    footer {
      padding: 24px 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .footer-tagline {
      font-size: 13px;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 1.5px;
      color: rgba(220, 220, 220, 0.75);
      margin: 0;
    }

    .footer-copyright {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 1px;
      color: rgba(220, 220, 220, 0.45);
      margin: 0;
    }
  </style>
  <body>
    <div class="bgimg">
      <div class="topleft">
        <p>PelBen Pharmacy</p>
      </div>
      <div class="middle">
        <h1>COMING SOON</h1>
        <hr />
        <p id="demo"></p>
      </div>
      <footer>
        <p class="footer-tagline">Your Health, Our Priority</p>
        <p class="footer-copyright">&copy; 2026 PelBen Pharmacy. All rights reserved.</p>
      </footer>
    </div>

    <script>
      var countDownDate = new Date("Jul 1, 2026 12:00:00").getTime();

      var countdownfunction = setInterval(function () {
        var now = new Date().getTime();
        var distance = countDownDate - now;

        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("demo").innerHTML =
          days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

        if (distance < 0) {
          clearInterval(countdownfunction);
          document.getElementById("demo").innerHTML = "EXPIRED";
        }
      }, 1000);
    </script>
  </body>
</html>
